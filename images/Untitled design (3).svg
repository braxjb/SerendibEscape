<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" width="512" height="512">
<style>
    /* 1. Default Style (For Dark Mode Tabs) */
    /* Since your original background is dark navy, we use transparent background */
    /* and make the wave paths a bright, vibrant gold so they pop on dark tabs */
    .favicon-wave { 
      fill: none;
      stroke: #FFC107; 
      stroke-width: 16; /* Thickened to keep lines visible at 16x16 size */
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    
    /* 2. Automated Switch (For Light Mode Tabs) */
    /* When a user switches to light mode, the lines automatically morph */
    /* to a deep navy blue so they contrast sharply against light gray tabs */
    @media (prefers-color-scheme: light) {
      .favicon-wave { 
        stroke: #0A1D37; 
      }
    }
  </style>
